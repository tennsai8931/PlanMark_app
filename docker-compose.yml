services:
  db:
    image: postgres:16
    container_name: planmark_db
    environment:
      POSTGRES_DB: planmark_db
      POSTGRES_USER: planmark_user
      POSTGRES_PASSWORD: planmark_password
    ports:
      - "5432:5432"
    volumes:
      - planmark_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: planmark_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db

volumes:
  planmark_pgdata: