services:

  db:
    image: postgres:16
    container_name: planmark_db

    environment:
      POSTGRES_DB: planmark
      POSTGRES_USER: planmark_user
      POSTGRES_PASSWORD: planmark_password

    ports:
      - "5432:5432"

    volumes:
      - planmark_db_data:/var/lib/postgresql/data


  web:
    build: .

    container_name: planmark_web

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      POSTGRES_DB: planmark
      POSTGRES_USER: planmark_user
      POSTGRES_PASSWORD: planmark_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432


volumes:
  planmark_db_data: